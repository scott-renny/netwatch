##############################################################
# NET-WATCH — Nginx site configuration
# Place this file at: /etc/nginx/sites-available/netwatch
# Then enable it with:
#   sudo ln -s /etc/nginx/sites-available/netwatch \
#              /etc/nginx/sites-enabled/netwatch
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################

server {
    listen 80;

    # Replace with your Ubuntu Server laptop's LAN IP address.
    # You can find it with: ip addr show | grep "inet " | grep -v 127
    # Example: server_name YOUR_SERVER_IP;
    server_name _;  # ← _ means "match any hostname" — fine for LAN use

    # The dashboard HTML/JS/CSS files
    root /opt/netwatch/web;
    index index.html;

    # Serve the dashboard
    location / {
        try_files $uri $uri/ /index.html;

        # Enable gzip for faster loading on the tablet/phone
        gzip on;
        gzip_types text/html text/css application/javascript;
    }

    # Proxy /api/* calls to the Flask backend on port 5000.
    # The dashboard JS calls /api/status, /api/devices, etc. —
    # Nginx forwards them to Flask and returns the response,
    # so the browser never needs to know port 5000 exists.
    location /api/ {
        proxy_pass         http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;

        # Forward the real client IP so Flask logs show device addresses
        # not just 127.0.0.1
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Increase timeouts for the /api/scan endpoint — arp-scan on
        # a large network can take up to 30 seconds
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Block direct access to the config JSON files — they contain device
    # IPs and Pi-hole credentials and should never be served publicly
    location /config/ {
        deny all;
    }

    # Standard security headers
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
